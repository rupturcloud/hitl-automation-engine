<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Will Dados - Overlay</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: transparent;
      overflow: hidden;
    }

    #overlay-root {
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 999999;
      pointer-events: none;
    }

    .robot-cursor {
      position: fixed;
      width: 24px;
      height: 24px;
      pointer-events: none;
      z-index: 999999;
      display: none;
    }

    .robot-cursor.active {
      display: block;
    }

    .robot-cursor-dot {
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, #ff6b35 0%, #ff8c42 70%, transparent 100%);
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(255, 107, 53, 0.8);
      animation: pulse 0.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .bet-indicator {
      position: fixed;
      padding: 8px 12px;
      background: rgba(255, 107, 53, 0.9);
      color: white;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      pointer-events: none;
      z-index: 999998;
      display: none;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .bet-indicator.active {
      display: block;
    }
  </style>
</head>
<body>
  <div id="overlay-root">
    <div class="robot-cursor" id="robot-cursor">
      <div class="robot-cursor-dot"></div>
    </div>
    <div class="bet-indicator" id="bet-indicator"></div>
  </div>

  <script>
    // Overlay script - apenas para render visual de cursor do robô
    // A lógica principal está em realizarAposta.js e content.js

    (function() {
      const cursor = document.getElementById('robot-cursor');
      const indicator = document.getElementById('bet-indicator');

      // Escutar eventos de movimento do cursor do robô
      window.addEventListener('message', (event) => {
        if (event.source !== window) return;

        const { type, payload } = event.data || {};

        if (type === 'ROBOT_CURSOR_MOVE') {
          const { x, y } = payload;
          cursor.style.left = (x - 12) + 'px';
          cursor.style.top = (y - 12) + 'px';
          cursor.classList.add('active');
        }

        if (type === 'ROBOT_BET_PLACED') {
          const { action, stake, result } = payload;
          indicator.textContent = `${action.toUpperCase()} - R$ ${stake}`;
          indicator.style.left = payload.x + 'px';
          indicator.style.top = (payload.y - 30) + 'px';
          indicator.classList.add('active');

          setTimeout(() => {
            indicator.classList.remove('active');
          }, 2000);
        }

        if (type === 'ROBOT_CURSOR_HIDE') {
          cursor.classList.remove('active');
        }
      });
    })();
  </script>
</body>
</html>
