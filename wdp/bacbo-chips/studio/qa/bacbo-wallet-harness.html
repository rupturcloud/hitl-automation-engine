<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bac Bo Wallet Harness</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        background: #050507;
        color: #f3f4f6;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, rgba(34, 211, 238, 0.18), transparent 40%), #050507;
      }
      .wrap {
        max-width: 1440px;
        margin: 0 auto;
        padding: 32px;
        display: grid;
        gap: 24px;
      }
      .panel {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 28px;
        padding: 24px;
        box-shadow: 0 24px 80px rgba(0,0,0,0.45);
        backdrop-filter: blur(14px);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        font-weight: 900;
        letter-spacing: -0.04em;
      }
      p {
        margin: 0;
        color: rgba(255,255,255,0.72);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 24px;
      }
      .card {
        border-radius: 20px;
        padding: 16px 18px;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(10,10,12,0.9);
      }
      .card strong {
        display: block;
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.54);
        margin-bottom: 8px;
      }
      .value {
        font-size: 24px;
        font-weight: 900;
      }
      .ok { color: #34d399; }
      .pending { color: #fbbf24; }
      .fail { color: #f87171; }
      iframe {
        width: 100%;
        height: 1180px;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 28px;
        background: #070709;
      }
      .done-banner {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 20px;
        padding: 12px 16px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.04);
      }
      body.done .done-banner {
        background: rgba(16,185,129,0.12);
        border-color: rgba(16,185,129,0.4);
        color: #34d399;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="panel">
        <h1>Harness Playwright — Bac Bo Live x Wallet</h1>
        <p>Este cenário semeia a wallet local, carrega o Bac Bo Live e injeta um SYNC_DATA do bridge para validar fallback e sincronização.</p>

        <div class="grid">
          <div class="card">
            <strong>Wallet fallback</strong>
            <div id="wallet-status" class="value pending">PENDENTE</div>
          </div>
          <div class="card">
            <strong>Bridge sync</strong>
            <div id="bridge-status" class="value pending">PENDENTE</div>
          </div>
          <div class="card">
            <strong>Saldo renderizado</strong>
            <div id="balance-value" class="value">--</div>
          </div>
          <div class="card">
            <strong>Timer renderizado</strong>
            <div id="timer-value" class="value">--</div>
          </div>
        </div>

        <div class="done-banner" id="summary">Running QA scenario...</div>
      </section>

      <iframe id="app-frame" title="Bac Bo Live QA Harness"></iframe>
    </div>

    <script>
      const walletStatus = document.getElementById('wallet-status');
      const bridgeStatus = document.getElementById('bridge-status');
      const balanceValue = document.getElementById('balance-value');
      const timerValue = document.getElementById('timer-value');
      const summary = document.getElementById('summary');
      const frame = document.getElementById('app-frame');

      const walletSeed = {
        balance: 4321.98,
        history: [
          {
            id: 'seed-wallet-1',
            type: 'DEPOSIT',
            amount: 4321.98,
            timestamp: 1710000000000,
            description: 'Seed wallet',
          },
        ],
      };

      const sessionSeed = {
        name: 'Diego Ruptur',
        email: 'diego@ruptur.cloud',
        memberStatus: 'Platinum',
      };

      localStorage.setItem('betia_session', JSON.stringify(sessionSeed));
      localStorage.setItem('betia_wallet_data', JSON.stringify(walletSeed));

      const expectedWallet = 'R$ 4.321,98';
      const expectedBridge = 'R$ 9.876,54';
      const expectedTimer = '12.4';

      function readFrameDocument() {
        return frame.contentWindow?.document || null;
      }

      function readBalance() {
        return readFrameDocument()?.querySelector('[data-betia-id="balance"]')?.textContent?.trim() || '';
      }

      function readTimer() {
        return readFrameDocument()?.querySelector('[data-betia-id="timer"]')?.textContent?.trim() || '';
      }

      function renderLiveValues() {
        balanceValue.textContent = readBalance() || '--';
        timerValue.textContent = readTimer() || '--';
      }

      function mark(el, kind, text) {
        el.className = `value ${kind}`;
        el.textContent = text;
      }

      async function waitFor(check, timeoutMs = 12000, intervalMs = 100) {
        const deadline = Date.now() + timeoutMs;
        while (Date.now() < deadline) {
          renderLiveValues();
          if (await check()) return true;
          await new Promise((resolve) => setTimeout(resolve, intervalMs));
        }
        return false;
      }

      async function runScenario() {
        summary.textContent = 'Running QA scenario...';
        frame.src = '/bacbo?qaHarness=1';

        const walletOk = await waitFor(() => readBalance() === expectedWallet);
        mark(walletStatus, walletOk ? 'ok' : 'fail', walletOk ? 'PASS' : 'FAIL');

        if (!walletOk) {
          summary.textContent = `FAIL: fallback da wallet não apareceu. Balance atual: ${readBalance() || '--'}`;
          return;
        }

        frame.contentWindow.postMessage(
          {
            source: '__BETIA_EXT__',
            type: 'SYNC_DATA',
            data: {
              balanceRaw: expectedBridge,
              balanceSource: 'viewer',
              timer: expectedTimer,
              countdown: 12.4,
              lastResult: 'PLAYER',
              history: ['PLAYER', 'BANKER', 'TIE'],
              status: 'BETTING',
              isSyncing: true,
              ts: Date.now(),
              sources: ['viewer'],
            },
          },
          '*',
        );

        const bridgeOk = await waitFor(() => {
          const wallet = JSON.parse(localStorage.getItem('betia_wallet_data') || '{}');
          return readBalance() === expectedBridge && readTimer().includes(expectedTimer) && wallet.balance === 9876.54;
        });

        mark(bridgeStatus, bridgeOk ? 'ok' : 'fail', bridgeOk ? 'PASS' : 'FAIL');

        if (!bridgeOk) {
          summary.textContent = `FAIL: sync bridge não refletiu no HUD/localStorage. Balance: ${readBalance() || '--'} | Timer: ${readTimer() || '--'}`;
          return;
        }

        document.body.classList.add('done');
        summary.textContent = 'DONE · wallet fallback + bridge sync validados';
      }

      window.addEventListener('load', () => {
        runScenario().catch((error) => {
          summary.textContent = `FAIL: ${error?.message || error}`;
          mark(walletStatus, 'fail', 'FAIL');
          mark(bridgeStatus, 'fail', 'FAIL');
        });
      });
    </script>
  </body>
</html>
