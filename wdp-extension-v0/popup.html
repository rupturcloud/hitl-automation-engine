<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Will Dados Robô</title>
  <style>
    :root{--green:#07910b;--green2:#13b817;--red:#ef4444;--yellow:#facc15;--gray:#d1d5db;--black:#050505}
    *{box-sizing:border-box} body{width:380px;margin:0;padding:0;font-family:Arial,sans-serif;background:#f5f5f5;color:#111}.title{height:36px;line-height:36px;text-align:center;font-weight:800;background:linear-gradient(#eee,#cfcfcf);border-bottom:1px solid #999;font-family:Georgia,serif}.body{padding:14px}.logo{width:92px;height:92px;margin:0 auto 12px;background:linear-gradient(135deg,#260000,#d71920 58%,#facc15);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;text-align:center;line-height:.92;text-shadow:0 2px 3px #000;font-size:21px}.logo span{color:#facc15;font-size:17px}.statusbar{min-height:40px;line-height:40px;text-align:center;border-radius:8px;background:linear-gradient(var(--green2),var(--green));font-weight:900;color:#052e09;border:1px solid #046307;margin:10px 0;padding:0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.statusbar.off{background:linear-gradient(#6b7280,#374151);color:#fff;border-color:#374151}.statusbar.alert{background:linear-gradient(#facc15,#d97706);color:#111;border-color:#92400e}.hint{font-size:12px;color:#6b7280;background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:8px;margin:8px 0;line-height:1.35}.row{display:flex;justify-content:space-between;background:#fff;border:1px solid #e5e7eb;border-radius:6px;padding:7px;margin:6px 0}.label{color:#6b7280;font-size:11px;text-transform:uppercase;font-weight:800}.value{font-weight:800}.pos{color:#078407}.neg{color:#b91c1c}.toggle{width:104px;height:38px;border:0;border-radius:8px;background:#050505;color:#fff;font-weight:900;cursor:pointer;margin:0 0 10px}.toggle.disabled{opacity:.55;cursor:not-allowed}.btn{width:100%;padding:10px;border:0;border-radius:8px;margin:5px 0;font-weight:800;cursor:pointer}.config{background:#111;color:#fff}.secondary{background:#e5e7eb;color:#111}.export{background:#dbeafe;color:#111}.logs{max-height:165px;overflow:auto;background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:8px;font-size:11px}.log{border-bottom:1px solid #eee;padding:4px 0}.muted{color:#777;font-size:11px;margin:6px 0}.hidden{display:none!important}.actions{display:grid;grid-template-columns:1fr 1fr;gap:7px}.actions .btn{margin:0}.section-title{font-size:12px;color:#07910b;text-transform:uppercase;font-weight:900;margin:10px 0 6px}.pill{display:inline-block;padding:2px 6px;border-radius:999px;background:#e5e7eb;font-size:10px;font-weight:800}.pill.on{background:#dcfce7;color:#166534}.pill.off{background:#fee2e2;color:#991b1b}.pill.warn{background:#fef3c7;color:#92400e}
  </style>
</head>
<body>
  <div class="title">Painel de Configuração (Bac Bo)</div>
  <div class="body">
    <div class="logo">WILL<br><span>DADOS</span></div>
    <button id="btn-toggle" class="toggle">Ligar</button>
    <div id="status" class="statusbar off">Aguardando Padrões do Will...</div>
    <div id="hint" class="hint">Abra ou recarregue a mesa Bac Bo para sincronizar.</div>

    <div id="metrics" class="hidden">
      <div class="row"><span class="label">Banca</span><span id="bankroll" class="value">R$ 0</span></div>
      <div class="row"><span class="label">Lucro</span><span id="lucro" class="value">R$ 0</span></div>
      <div class="row"><span class="label">Stake/Gale</span><span id="stake" class="value">R$ 0 / G0</span></div>
      <div class="row"><span class="label">Meta / Stop</span><span id="meta-stop" class="value">--</span></div>
      <div class="row"><span class="label">Modo</span><span id="mode" class="value">Shadow</span></div>
      <div class="row"><span class="label">WS / Aposta</span><span id="ws-bet" class="value">--</span></div>
    </div>

    <div id="ultimo-padrao" class="muted">Último padrão: --</div>

    <div class="actions">
      <button id="btn-sidepanel" class="btn config">Abrir painel</button>
      <button id="btn-overlay" class="btn secondary">Overlay</button>
    </div>
    <button id="btn-options" class="btn secondary">Configurações</button>
    <button id="btn-export" class="btn export hidden">Exportar logs CSV</button>

    <div id="logs-title" class="section-title hidden">Últimos logs</div>
    <div class="logs hidden" id="logs"><div class="log">Sem logs ainda.</div></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
