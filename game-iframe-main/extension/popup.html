<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. Bac Bo</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <!-- CABEÇALHO -->
        <div class="header">
            <h1>J.A.R.V.I.S.</h1>
            <div class="status-indicator" id="connectionStatus">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Desconectado</span>
            </div>
        </div>

        <!-- SEÇÃO DE STATUS -->
        <div class="section status-section">
            <div class="section-title">Status</div>

            <div class="status-row">
                <span class="label">Estado:</span>
                <span class="value" id="stateValue">IDLE</span>
            </div>

            <div class="status-row">
                <span class="label">Modo:</span>
                <span class="value" id="modeValue">MANUAL</span>
            </div>

            <div class="status-row">
                <span class="label">Saldo:</span>
                <span class="value highlight" id="bankrollValue">R$ 0.00</span>
            </div>

            <div class="status-row">
                <span class="label">Rodada:</span>
                <span class="value" id="roundValue">--</span>
            </div>
        </div>

        <!-- COUNTDOWN -->
        <div class="section countdown-section">
            <div class="countdown-display">
                <div class="countdown-circle">
                    <svg viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="45" class="countdown-bg"></circle>
                        <circle cx="50" cy="50" r="45" class="countdown-progress" id="countdownProgress"></circle>
                    </svg>
                    <div class="countdown-text" id="countdownText">--</div>
                </div>
            </div>
        </div>

        <!-- HISTÓRICO DE RODADAS COM BOLINHAS -->
        <div class="section rounds-history-section">
            <div class="section-title">📊 Histórico de Rodadas</div>

            <div class="rounds-container">
                <!-- Botão scroll esquerda -->
                <button class="scroll-nav scroll-left" id="scrollLeft" title="Anterior">◀</button>

                <!-- Histórico scrollável -->
                <div class="rounds-history-scroll" id="roundsScroll">
                    <div class="rounds-history" id="roundsHistory">
                        <!-- Bolinhas do histórico serão adicionadas aqui via JS -->
                    </div>
                </div>

                <!-- Coluna fixa da rodada atual -->
                <div class="current-round-fixed">
                    <div class="round-ball" id="currentRoundBall">
                        <span class="ball-border" id="ballBorder"></span>
                        <span class="ball-content" id="ballContent">◯</span>
                    </div>
                </div>

                <!-- Botão scroll direita -->
                <button class="scroll-nav scroll-right" id="scrollRight" title="Próximo">▶</button>
            </div>
        </div>

        <!-- ALERTAS -->
        <div class="section alerts-section">
            <div class="section-title">Alertas</div>
            <div class="alerts-list" id="alertsList">
                <div class="alert-item alert-info">
                    <span class="alert-dot"></span>
                    <span>Aguardando conexão...</span>
                </div>
            </div>
        </div>

        <!-- CONTROLES -->
        <div class="section controls-section">
            <div class="section-title">Controles</div>

            <div class="button-group">
                <button class="btn btn-primary" id="btnStart" title="Iniciar daemon">
                    <span class="btn-icon">▶</span> Iniciar
                </button>
                <button class="btn btn-warning" id="btnPause" title="Pausar execução" disabled>
                    <span class="btn-icon">⏸</span> Pausar
                </button>
            </div>

            <div class="button-group">
                <button class="btn btn-success" id="btnResume" title="Retomar execução" disabled>
                    <span class="btn-icon">▶</span> Retomar
                </button>
                <button class="btn btn-danger" id="btnStop" title="Parar daemon" disabled>
                    <span class="btn-icon">⏹</span> Parar
                </button>
            </div>
        </div>

        <!-- CONTROLE REMOTO DA BANCA (CHIPS + CONTROLES) -->
        <div class="section remote-control-section">
            <div class="section-title">💰 Controle Remoto da Banca</div>

            <!-- CHIPS (Como em Betboom) -->
            <div class="chips-container">
                <button class="chip" id="chip5" data-value="5" title="R$ 5">
                    <span class="chip-value">5</span>
                </button>
                <button class="chip" id="chip10" data-value="10" title="R$ 10">
                    <span class="chip-value">10</span>
                </button>
                <button class="chip" id="chip25" data-value="25" title="R$ 25">
                    <span class="chip-value">25</span>
                </button>
                <button class="chip" id="chip50" data-value="50" title="R$ 50">
                    <span class="chip-value">50</span>
                </button>
                <button class="chip" id="chip100" data-value="100" title="R$ 100">
                    <span class="chip-value">100</span>
                </button>
                <button class="chip" id="chip500" data-value="500" title="R$ 500">
                    <span class="chip-value">500</span>
                </button>
            </div>

            <!-- CONTROLES: REDUZIR | VALOR | DOBRAR -->
            <div class="bet-controls-panel">
                <button class="btn-control btn-reduce" id="btnReduce" title="Reduzir aposta" disabled>
                    <span>➖</span>
                    <span>REDUZIR</span>
                </button>

                <div class="bet-display">
                    <div class="bet-amount-display" id="betDisplay">R$ 0</div>
                    <div class="bet-description">Aposta Total</div>
                </div>

                <button class="btn-control btn-double" id="btnDouble" title="Dobrar aposta" disabled>
                    <span>2️⃣</span>
                    <span>DOBRAR</span>
                </button>
            </div>

            <!-- SELEÇÃO DE LADO: BLUE | RED | TIE -->
            <div class="side-selector">
                <button class="btn-side btn-side-blue" id="sideBlue" title="Apostar em BLUE" disabled>
                    <span class="side-icon">🔵</span>
                    <span class="side-label">BLUE</span>
                </button>
                <button class="btn-side btn-side-red" id="sideRed" title="Apostar em RED" disabled>
                    <span class="side-icon">🔴</span>
                    <span class="side-label">RED</span>
                </button>
                <button class="btn-side btn-side-tie" id="sideTie" title="Apostar em TIE" disabled>
                    <span class="side-icon">⚪</span>
                    <span class="side-label">TIE</span>
                </button>
            </div>

            <!-- BOTÃO CONFIRMAR APOSTA -->
            <button class="btn-confirm-bet" id="btnConfirmBet" title="Confirmar e enviar aposta" disabled>
                <span class="confirm-icon">✅</span>
                <span class="confirm-text">ENVIAR APOSTA</span>
            </button>

            <!-- LIMPAR APOSTA -->
            <button class="btn-clear-bet" id="btnClearBet" title="Limpar aposta" disabled>
                <span>LIMPAR</span>
            </button>
        </div>

        <!-- CONFIGURAÇÕES -->
        <div class="section config-section">
            <div class="section-title">Configuração</div>

            <div class="config-row">
                <label for="daemonUrl">URL do Daemon:</label>
                <input type="text" id="daemonUrl" class="config-input" placeholder="ws://localhost:8765" value="ws://localhost:8765">
            </div>

            <button class="btn btn-small btn-secondary" id="btnSaveConfig">Salvar</button>
        </div>

        <!-- RODAPÉ -->
        <div class="footer">
            <small>v1.0 • Bac Bo Evolution</small>
        </div>
    </div>

    <!-- MODAL - ENTRADA MANUAL -->
    <div class="modal" id="manualModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Entrada Manual</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>

            <div class="modal-body">
                <div class="form-group">
                    <label for="manualSide">Lado:</label>
                    <select id="manualSide" class="form-input">
                        <option value="">-- Selecionar --</option>
                        <option value="BLUE">🔵 BLUE (Azul)</option>
                        <option value="RED">🔴 RED (Vermelho)</option>
                        <option value="TIE">⚪ TIE (Empate)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="manualStake">Valor (R$):</label>
                    <input type="number" id="manualStake" class="form-input" placeholder="100" min="0" step="5">
                </div>

                <div class="form-hint">
                    Use múltiplos de 5. Máximo: R$ 10.000
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" id="modalCancel">Cancelar</button>
                <button class="btn btn-primary" id="modalSubmit">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
