version: 1
updated_at: "2026-04-19"

default_rules:
  - "Toda mensagem interna começa com uma capinha explícita."
  - "Descobertas estruturais, operacionais ou de governança saem com notify_state=yes."
  - "Todo aprendizado durável obtido em investigação, execução ou operação é tratado como descoberta e também sai com notify_state=yes."
  - "Toda descoberta ou aprendizado durável gera duas trilhas mínimas: capinha `self://jarvis` para memória operacional imediata e registro no `state_outbox` para promoção canônica."
  - "Mensagens entre pares devem carregar escopo, decisão e próximo passo."
  - "Quando houver dúvida entre silêncio e rastreabilidade, escolha rastreabilidade."
  - "Nenhum projeto crítico fecha como entregue sem evidência de commit, push, preprod, testes, deploy em produção e capitalização no state."
  - "Protocolo Anti-Wonderland (AWP): Nenhuma pesquisa deve exceder 3 chamadas de ferramenta sem validação intermediária (bloco -> validação)."
  - "Fail-Fast em Timeouts: Se uma ferramenta demorar ou falhar, relate o estado parcial e peça orientação em vez de retroalimentar loops infinitos."

capsules:
  self_reflection:
    prefix: "⌬ self://jarvis"
    use_when: "auto-checagem, revisão de hipótese, alinhamento de rota, reflexão curta ou consolidação de descoberta/aprendizado"
    required_fields:
      - cycle
      - subject
      - summary
      - decision
      - next_action
      - notify_state
    template: |
      ⌬ self://jarvis | cycle=<n> | subject=<tema> | notify_state=<yes|no>
      summary: <leitura curta>
      decision: <decisão atual>
      next_action: <próxima ação>

  peer_handoff:
    prefix: "⌬ peer://<from>-><to>"
    use_when: "handoff, delegação, sincronização ou pedido de apoio entre perfis"
    required_fields:
      - scope
      - context
      - ask
      - due_signal
      - notify_state
    template: |
      ⌬ peer://jarvis->ops | scope=<infra|deploy|finops|produto> | notify_state=<yes|no>
      context: <contexto mínimo>
      ask: <pedido objetivo>
      due_signal: <gatilho de retorno>

  state_notice:
    prefix: "⌬ state://jarvis"
    use_when: "descoberta durável, aprendizado durável, mudança de protocolo, insight de infra, telemetria ou governança"
    required_fields:
      - source
      - impact
      - local_ref
      - promotion_target
      - urgency
    template: |
      ⌬ state://jarvis | source=<house|ops|runtime> | urgency=<low|medium|high>
      impact: <o que mudou ou foi descoberto>
      local_ref: <arquivo local>
      promotion_target: <destino sugerido no state>

  peer_status:
    prefix: "⌬ status://<agent>"
    use_when: "checkpoint curto de saúde, progresso, bloqueio ou telemetria"
    required_fields:
      - lane
      - status
      - blocker
      - next_action
    template: |
      ⌬ status://ops | lane=<infra> | status=<green|yellow|red>
      blocker: <nenhum|descrição>
      next_action: <próxima ação>

  release_gate:
    prefix: "⌬ gate://jarvis"
    use_when: "cobrança, auditoria ou liberação de entrega crítica por projeto"
    required_fields:
      - project
      - branch
      - commit
      - remote
      - preprod
      - functional_tests
      - load_tests
      - security_tests
      - production
      - state_capitalization
      - blocker
      - next_action
      - notify_state
    template: |
      ⌬ gate://jarvis | project=<repo|produto> | notify_state=<yes|no>
      branch: <branch>
      commit: <hash|pendente>
      remote: <ok|falhou|pendente>
      preprod: <ok|falhou|pendente>
      functional_tests: <ok|falhou|pendente>
      load_tests: <ok|falhou|pendente>
      security_tests: <ok|falhou|pendente>
      production: <ok|falhou|pendente>
      state_capitalization: <ok|pendente>
      blocker: <nenhum|descrição>
      next_action: <ação objetiva>

operational_gates:
  research_boundary:
    limit: 3
    action: "Obrigatório emitir self://jarvis para validar o progresso antes de nova rodada"
    on_timeout: "Abortar, reportar estado parcial e aguardar aprovação humana ou do Maestro"
