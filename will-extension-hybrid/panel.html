<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Will Dados Pro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(90deg, #222 0%, #2a2a2a 100%);
      border-bottom: 3px solid #00ff00;
      padding: 12px 16px;
      text-align: center;
      flex-shrink: 0;
    }

    header h1 { font-size: 18px; margin: 0; text-shadow: 0 0 10px #00ff00; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 12px;
      gap: 10px;
    }

    /* Seção de Controle */
    .control-section {
      flex-shrink: 0;
      display: flex;
      gap: 8px;
    }

    button {
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      flex: 1;
    }

    #go-btn {
      background: linear-gradient(90deg, #00dd00 0%, #00aa00 100%);
      color: #fff;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
    }

    #go-btn:hover:not(:disabled) {
      background: linear-gradient(90deg, #00ff00 0%, #00dd00 100%);
      box-shadow: 0 0 25px rgba(0, 255, 0, 0.8);
      transform: scale(1.02);
    }

    #go-btn:disabled { background: #444; cursor: not-allowed; box-shadow: none; }

    #cancel-btn {
      background: linear-gradient(90deg, #ff4444 0%, #cc0000 100%);
      color: #fff;
      display: none;
      box-shadow: 0 0 15px rgba(255, 68, 68, 0.5);
    }

    #cancel-btn.active { display: flex; align-items: center; justify-content: center; }

    #cancel-btn:hover { background: linear-gradient(90deg, #ff6666 0%, #ff0000 100%); box-shadow: 0 0 25px rgba(255, 68, 68, 0.8); }

    /* Countdown Bar */
    .countdown-section {
      flex-shrink: 0;
      background: rgba(30, 30, 30, 0.8);
      border-radius: 8px;
      padding: 10px;
      border-left: 4px solid #00aa00;
    }

    .countdown-label { font-size: 11px; color: #888; margin-bottom: 6px; }
    .countdown-bar {
      height: 20px;
      background: #111;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 8px;
      border: 1px solid #333;
    }

    .countdown-progress {
      height: 100%;
      background: linear-gradient(90deg, #00dd00 0%, #ffdd00 50%, #ff4444 100%);
      transition: width 0.5s linear;
      width: 100%;
    }

    .countdown-text {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
    }

    .countdown-time {
      font-size: 20px;
      font-weight: bold;
      color: #00ff00;
    }

    /* Estado Atual */
    .state-section {
      flex-shrink: 0;
      background: rgba(30, 30, 30, 0.8);
      border-radius: 8px;
      padding: 12px;
      border-left: 4px solid #ffaa00;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .state-icon { font-size: 28px; margin-right: 10px; }
    .state-text {
      flex: 1;
    }

    .state-label { font-size: 11px; color: #888; }
    .state-value { font-size: 14px; font-weight: bold; color: #ffaa00; }

    /* Stats Compactas */
    .stats-section {
      flex-shrink: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat-box {
      background: rgba(30, 30, 30, 0.8);
      padding: 8px;
      border-radius: 6px;
      text-align: center;
      border-top: 2px solid #00aa00;
    }

    .stat-box.loss { border-top-color: #ff4444; }
    .stat-box.neutral { border-top-color: #ffaa00; }

    .stat-value { font-size: 18px; font-weight: bold; }
    .stat-label { font-size: 10px; color: #888; margin-top: 4px; }

    /* Activity Log */
    .log-section {
      flex: 1;
      background: rgba(20, 20, 20, 0.9);
      border-radius: 8px;
      padding: 8px;
      border-left: 4px solid #0088ff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .log-header { font-size: 10px; color: #888; margin-bottom: 6px; }

    #log {
      flex: 1;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.4;
      scrollbar-width: thin;
      scrollbar-color: #444 transparent;
    }

    #log::-webkit-scrollbar { width: 6px; }
    #log::-webkit-scrollbar-track { background: transparent; }
    #log::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

    .log-line {
      margin: 2px 0;
      padding: 2px 4px;
      border-radius: 2px;
    }

    .log-line.info { color: #ffaa00; }
    .log-line.ok { color: #00dd00; }
    .log-line.error { color: #ff4444; }
    .log-line.warn { color: #ff8800; }

    /* Responsiveness */
    @media (max-width: 400px) {
      header h1 { font-size: 16px; }
      main { padding: 8px; gap: 8px; }
      button { padding: 10px; font-size: 14px; }
      .countdown-time { font-size: 18px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>⚡ Will Dados Pro</h1>
  </header>

  <main>
    <!-- Controles -->
    <div class="control-section">
      <button id="go-btn">🚀 GO</button>
      <button id="cancel-btn">⏹ PARAR</button>
    </div>

    <!-- Countdown -->
    <div class="countdown-section">
      <div class="countdown-label">⏱ COUNTDOWN</div>
      <div class="countdown-bar">
        <div class="countdown-progress" id="countdown-progress"></div>
      </div>
      <div class="countdown-text">
        <span id="countdown-time" class="countdown-time">--:--</span>
        <span id="countdown-status" style="font-size: 11px; color: #888;">Aguardando...</span>
      </div>
    </div>

    <!-- Estado Atual -->
    <div class="state-section">
      <div class="state-icon" id="state-icon">💤</div>
      <div class="state-text">
        <div class="state-label">ESTADO</div>
        <div class="state-value" id="state-value">Aguardando...</div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-section">
      <div class="stat-box">
        <div class="stat-value" id="stat-saldo">R$ 0</div>
        <div class="stat-label">Saldo</div>
      </div>
      <div class="stat-box neutral">
        <div class="stat-value" id="stat-pnl">+R$ 0</div>
        <div class="stat-label">P&L</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="stat-wins">0</div>
        <div class="stat-label">Wins</div>
      </div>
      <div class="stat-box loss">
        <div class="stat-value" id="stat-losses">0</div>
        <div class="stat-label">Losses</div>
      </div>
    </div>

    <!-- Log -->
    <div class="log-section">
      <div class="log-header">📋 ATIVIDADE</div>
      <div id="log">Iniciando...</div>
    </div>
  </main>

  <script src="panel.js"></script>
</body>
</html>
